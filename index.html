<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="">
  <meta property="og:title" content="BAELAB">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://baelab.co.kr/">
  <title>BAELAB</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">본문 바로가기</a>

  <header class="site-header" id="top">
    <div class="container header-inner">
      <a class="brand" href="#top" aria-label="BAELAB 홈">BAELAB</a>

      <button class="menu-button" type="button" aria-expanded="false" aria-controls="primary-navigation">
        <span class="sr-only">메뉴 열기</span>
        <span></span>
        <span></span>
      </button>

      <nav class="primary-nav" id="primary-navigation" aria-label="주요 메뉴">
        <a href="#education">학력</a>
        <a href="#experience">경력</a>
        <a href="#certification">자격증</a>
        <a href="#activities">기타 활동</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="intro-section" aria-labelledby="intro-title">
      <div class="container intro-layout">
        <div>
          <p class="eyebrow">CAREER PROFILE</p>
          <h1 id="intro-title" data-profile="name">배성민</h1>
          <p class="intro-role" data-profile="role"></p>
          <p class="intro-description" data-profile="description"></p>
        </div>
        <dl class="summary-list" id="summary-list" aria-label="핵심 이력 요약">
          <div class="loading-item">이력 데이터를 불러오는 중입니다.</div>
        </dl>
      </div>
    </section>

    <section class="resume-section" id="education" aria-labelledby="education-title">
      <div class="container resume-layout">
        <header class="section-heading">
          <p class="section-number">01</p>
          <div>
            <p class="section-label">EDUCATION</p>
            <h2 id="education-title">학력사항</h2>
          </div>
        </header>
        <div class="record-list" id="education-list" aria-live="polite"></div>
      </div>
    </section>

    <section class="resume-section section-muted" id="experience" aria-labelledby="experience-title">
      <div class="container resume-layout">
        <header class="section-heading">
          <p class="section-number">02</p>
          <div>
            <p class="section-label">EXPERIENCE</p>
            <h2 id="experience-title">경력사항</h2>
            <p class="section-summary" id="career-summary"></p>
          </div>
        </header>
        <div class="record-list career-records" id="experience-list" aria-live="polite"></div>
      </div>
    </section>

    <section class="resume-section" id="certification" aria-labelledby="certification-title">
      <div class="container resume-layout">
        <header class="section-heading">
          <p class="section-number">03</p>
          <div>
            <p class="section-label">CERTIFICATION</p>
            <h2 id="certification-title">자격증</h2>
          </div>
        </header>
        <div class="certificate-list" id="certification-list" aria-live="polite"></div>
      </div>
    </section>

    <section class="resume-section section-muted activities-section" id="activities" aria-labelledby="activities-title">
      <div class="container resume-layout">
        <header class="section-heading activities-heading">
          <p class="section-number">04</p>
          <div>
            <p class="section-label">ACTIVITIES</p>
            <h2 id="activities-title">기타 활동</h2>
            <!--<p class="section-summary">평가위원, 전문위원, 강사, 멘토 및 심사 활동</p>-->
          </div>
        </header>
        <div class="activity-list" id="activity-list" aria-live="polite"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <a class="brand" href="#top">BAELAB</a>
      <p>© <span id="current-year"></span> Bae Seong Min. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
